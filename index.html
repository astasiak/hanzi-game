<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="index.js"></script>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="game-container" x-data="app">
        <div class="game-board">
            <div id="top-bar">
                <div class="label" id="mistakes-label">Mistakes: <span id="mistakes-counter" x-text="mistakes"></span></div>
                <div class="label" id="time-label" x-text="formatTime"></div>
            </div>
            <div id="anchorWrapper">
                <div class="anchor slot slot-start">Start</div>
                <div class="anchor slot slot-1">Slot 1</div>
                <div class="anchor slot slot-2">Slot 2</div>
                <div class="anchor slot slot-3">Slot 3</div>
                <div class="anchor slot slot-main">Main</div>
                <div class="anchor slot slot-reveal">Reveal</div>
                <div class="anchor slot slot-btn-1">Button 1</div>
                <div class="anchor slot slot-btn-2">Button 2</div>
                <div class="anchor slot slot-btn-3">Button 3</div>
                <div class="anchor slot slot-btn-4">Button 4</div>
                <div class="anchor slot slot-btn-5">Button 5</div>
                <div class="anchor slot slot-btn-6">Button 6</div>
            </div>
            
            <div id="cardWrapper">
                <template x-for="card in cards" :key="card.id">
                    <div x-cloak class="card" :class="card.class">
                        <div class="card-side card-front"><span x-text="card.question"></span></div>
                        <div class="card-side card-back">
                            <div class="card-back-top"><span x-text="card.question"></span></div>
                            <div class="card-back-bottom"><span x-text="card.comment"></span></div>
                        </div>
                    </div>
                </template>
            </div>

            <div id="buttonWrapper">
                <template x-for="button in buttons" :key="button.id">
                    <div class="control-button" :id="button.id" @click="progressCard(button)" :class="button.class">
                        <span x-text="button.label"></span>
                    </div>
                </template>
            </div>

        </div>
    </div>
</body>

</html>
