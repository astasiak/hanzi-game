<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="index.js"></script>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="game-container" x-data="app" @resize.window.debounce.50ms="refreshAll()">
        <div class="game-board">
            <div class="game-grid">
                <div class="label" id="mistakes-label">Mistakes: <span id="mistakes-counter" x-text="mistakes"></span>
                </div>
                <div class="label" id="time-label" x-text="formatTime"></div>
                <div class="anchor" id="slot-0">anchor 0</div>
                <div class="anchor" id="slot-1">anchor 1</div>
                <div class="anchor" id="slot-2">anchor 2</div>
                <div class="anchor" id="slot-3">anchor 3</div>
                <div class="anchor" id="slot-4">anchor 4</div>
                <div class="anchor" id="slot-5">anchor 5</div>
                <div class="anchor" id="slot-6">anchor 6</div>
                <div class="anchor" id="slot-7">anchor 7</div>
                <div class="anchor" id="slot-8">anchor 8</div>
                <div class="anchor" id="slot-9">anchor 9</div>
                <div class="anchor" id="slot-10">anchor 10</div>
                <div class="anchor" id="slot-11">anchor 11</div>
                <div class="anchor" id="slot-12">anchor 12</div>
            </div>
            
            <template x-for="card in cards" :key="card.id">
                <div x-cloak class="card" :class="{ 'revealed': card.revealed, 'highlighted': card.highlighted }" :style="card.style">
                    <div class="card-side card-front"><span x-text="card.question"></span></div>
                    <div class="card-side card-back">
                        <div class="card-back-top"><span x-text="card.question"></span></div>
                        <div class="card-back-bottom"><span x-text="card.comment"></span></div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</body>

</html>
